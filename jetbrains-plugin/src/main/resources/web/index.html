<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QooCode 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #fff;
            padding: 12px 16px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #111;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #07c160;
            border-radius: 50%;
        }

        .status-text {
            font-size: 12px;
            color: #666;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f5f5;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            align-items: flex-start;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #07c160;
            color: #fff;
            margin-left: 8px;
        }

        .message.assistant .avatar {
            background: #e8e8e8;
            color: #424242;
            margin-right: 8px;
        }

        .bubble {
            max-width: 400px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: #07c160;
            color: #fff;
        }

        .message.assistant .bubble {
            background: #fff;
            color: #111;
            border: 1px solid #e5e5e5;
        }

        .input-area {
            background: #fff;
            padding: 12px;
            border-top: 1px solid #e8e8e8;
        }

        .input-area textarea {
            width: 100%;
            min-height: 80px;
            padding: 10px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
        }

        .input-area textarea:focus {
            border-color: #07c160;
        }

        .buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-clear {
            background: #e5e5e5;
            color: #333;
        }

        .btn-clear:hover {
            background: #d9d9d9;
        }

        .btn-send {
            background: #07c160;
            color: #fff;
        }

        .btn-send:hover {
            background: #06ad56;
        }

        .btn-send:disabled {
            background: #e5e5e5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>QooCode 助手</h1>
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">在线</span>
        </div>
    </div>

    <div class="messages" id="messages">
        <!-- 消息会动态添加到这里 -->
    </div>

    <div class="input-area">
        <textarea id="input" placeholder="输入消息，按 Ctrl+Enter 发送..."></textarea>
        <div class="buttons">
            <button class="btn-clear" id="clearBtn">清空</button>
            <button class="btn-send" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // 消息列表
        const messages = [];

        // 获取 DOM 元素
        const messagesContainer = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        // 添加消息
        function addMessage(role, content) {
            messages.push({ role, content });
            renderMessage(role, content);
        }

        // 渲染消息
        function renderMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '我' : 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 发送消息
        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // 添加用户消息
            addMessage('user', text);
            input.value = '';

            // 通过桥接发送给 Java 端
            if (window.qooCodeBridge) {
                window.qooCodeBridge.sendMessage({
                    action: 'chat',
                    message: text
                });
            } else {
                console.error('Bridge not available');
                // 模拟响应
                setTimeout(() => {
                    addMessage('assistant', '抱歉，无法连接到 QooCode 服务。');
                }, 500);
            }
        }

        // 清空消息
        function clearMessages() {
            messages.length = 0;
            messagesContainer.innerHTML = '';
        }

        // 接收来自 Java 的消息
        window.qooCodeReceive = function(data) {
            const { role, content } = data;
            addMessage(role, content);
        };

        // 事件监听
        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', clearMessages);

        input.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                sendMessage();
            }
        });

        // 初始化
        console.log('QooCode chat interface loaded');
    </script>
</body>
</html>
